name: oml_central
description: "Production-level Flutter boilerplate."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  get_it: ^9.2.1
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  webview_flutter: ^4.13.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  http: ^1.6.0
  gal: ^2.3.2
  flutter_native_splash: ^2.4.7
  flutter_image_compress: ^2.4.0
  google_maps_flutter: ^2.17.0
  image_cropper: ^12.1.1
  image_picker: ^1.2.1
  firebase_in_app_messaging: ^0.9.1
  firebase_auth: ^6.3.0
  firebase_app_installations: ^0.4.1
  archive: ^4.0.9
  path: ^1.9.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.example
    - .env.staging
    - .env.production
    - assets/lang/
    - assets/icon/
 
  fonts:
    - family: Kantumruy
      fonts:
        - asset: assets/fonts/kantumruy/KantumruyPro-Thin.ttf
          weight: 100
        - asset: assets/fonts/kantumruy/KantumruyPro-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/kantumruy/KantumruyPro-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-Light.ttf
          weight: 300
        - asset: assets/fonts/kantumruy/KantumruyPro-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/kantumruy/KantumruyPro-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/kantumruy/KantumruyPro-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/kantumruy/KantumruyPro-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/kantumruy/KantumruyPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/kantumruy/KantumruyPro-BoldItalic.ttf
          weight: 700
          style: italic


