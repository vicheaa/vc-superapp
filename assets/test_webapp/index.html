<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super App Bridge Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f5f5f7;
      color: #1d1d1f;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .status {
      font-family: monospace;
      background: #e5e5ea;
      padding: 8px;
      border-radius: 6px;
      word-break: break-all;
      margin-top: 8px;
    }
    button {
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      max-width: 400px;
      margin-bottom: 12px;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(0,122,255,0.3);
      transition: background-color 0.2s;
    }
    button:active {
      background-color: #0056b3;
    }
    .secondary-btn {
      background-color: #34c759;
      box-shadow: 0 2px 4px rgba(52,199,89,0.3);
    }
    .secondary-btn:active {
      background-color: #248a3d;
    }
    .danger-btn {
      background-color: #ff3b30;
      box-shadow: 0 2px 4px rgba(255,59,48,0.3);
    }
    .danger-btn:active {
      background-color: #b32b23;
    }
  </style>
</head>
<body>

  <h1>Super App Integration</h1>
  <p>Testing Web ↔ Native Bridge</p>

  <div class="card">
    <strong>Injected Auth Token:</strong>
    <div id="token-status" class="status">Waiting for token...</div>
  </div>

  <div class="card">
    <strong>Bridge Response:</strong>
    <div id="bridge-response" class="status">No response yet.</div>
  </div>

  <button onclick="requestUserInfo()">Get User Info (API)</button>
  <button class="secondary-btn" onclick="triggerNativeDialog()">Trigger Native Dialog</button>
  <button class="danger-btn" onclick="closeWebApp()">Close Mini App</button>


  <script>
    // 1. Initial Load: Check for injected token
    function checkToken() {
      // The native flutter code injects this variable before showing the page
      if (window.superAppAuthToken) {
        document.getElementById('token-status').innerText = window.superAppAuthToken;
      } else {
        document.getElementById('token-status').innerText = "❌ Token not found in window";
      }
    }

    // Call it right away in case it's injected sync, 
    // or wait a moment for async injection before load.
    window.onload = () => {
       checkToken();
    };

    // 2. Bridge Communication (Web -> Native)
    function sendMessageToNative(action, payload = {}) {
      if (window.SuperAppBridge) {
        // Must send as a string
        const message = JSON.stringify({ action: action, data: payload });
        window.SuperAppBridge.postMessage(message);
      } else {
        alert("SuperAppBridge is not available. Are you running inside the app?");
      }
    }

    // Actions
    function requestUserInfo() {
      document.getElementById('bridge-response').innerText = "Loading user info...";
      sendMessageToNative('getUserInfo');
    }

    function triggerNativeDialog() {
       sendMessageToNative('showDialog', { title: 'Hello from Web', message: 'This dialog is completely native!'});
    }

    function closeWebApp() {
       sendMessageToNative('close');
    }

    // 3. Bridge Communication (Native -> Web)
    // The Flutter app can evaluate Javascript to call this function
    window.receiveMessageFromNative = function(action, data) {
      if (action === 'userInfoResponse') {
        document.getElementById('bridge-response').innerText = JSON.stringify(data, null, 2);
      } else if (action === 'updateToken') {
        window.superAppAuthToken = data;
        checkToken();
      }
    };
  </script>
</body>
</html>
